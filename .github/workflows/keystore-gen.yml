name: Generate signing keystore

# One-off: generates the stable app-signing keystore and uploads it as an artifact.
# Download it and commit it to keystore/shotyou.jks so all builds share one signature.
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore shotyou.jks \
            -storetype JKS \
            -storepass shotyou -keypass shotyou \
            -alias shotyou \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Shot You, O=Shot You, C=US"
          echo "Created shotyou.jks ($(wc -c < shotyou.jks) bytes)"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: shotyou-keystore
          path: shotyou.jks
          if-no-files-found: error
